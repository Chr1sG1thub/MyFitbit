<!DOCTYPE html>
<html>
<head>
  <title>MyFitbit</title>
  <meta name="viewport" content="width=device-width">
</head>
<body style="font-family: Arial; padding: 20px; max-width: 800px; margin: auto;">
  <h1>MyFitbit</h1>

  <a href="https://www.fitbit.com/oauth2/authorize?client_id=23TZ3L&redirect_uri=https://chr1sg1thub.github.io/MyFitbit/callback.html&response_type=token&scope=activity%20heartrate">
  Connect Fitbit
</a>
  

  
  <div id="status" style="margin-top: 20px; padding: 15px; border: 1px solid #ccc; min-height: 50px;">
    Loading...
  </div>

  <script>
    const DOMAIN = 'my-fitbit.vercel.app';     // From Vercel dashboard
    const CLIENT_ID = '23TZ3L';              // From Fitbit dashboard

    function connectFitbit() {


//      https://www.fitbit.com/oauth2/authorize?response_type=token&client_id=YOUR_CLIENT_ID&redirect_uri=YOUR_URI&scope=activity%20heartrate
      

      
      
      const authUrl = `https://www.fitbit.com/oauth2/authorize?client_id=23TZ3L&redirect_uri=https://chr1sg1thub.github.io/MyFitbit/callback.html&response_type=token&scope=activity%20heartrate
`;
      window.location.href = authUrl;
    }

    function updateStatus() {
      const connected = localStorage.getItem('fitbit_connected') === '1';
      const statusEl = document.getElementById('status');
      if (connected) {
        statusEl.innerHTML = `
          <strong>✅ Connected to Fitbit!</strong><br>
          <button onclick="loadAllRides()" style="margin-top: 10px;">📊 Load All Rides</button>
        `;
      } else {
        statusEl.innerHTML = 'Click "Connect to Fitbit" to start. After auth, your /api/callback must store token and set localStorage.';
      }
    }

    async function loadAllRides() {
     try {
const token = localStorage.getItem('fitbit_token');
if (!token) return alert('No token—reauth');

// Daily wellness (today's data)
Promise.all([
  fetch('https://api.fitbit.com/1/user/-/activities/date/today.json', { headers: { Authorization: `Bearer ${token}` } }),
  fetch('https://api.fitbit.com/1/user/-/hr/date/today/1d.json', { headers: { Authorization: `Bearer ${token}` } }),
  fetch('https://api.fitbit.com/1.2/user/-/sleep/date/today.json', { headers: { Authorization: `Bearer ${token}` } })
]).then(async ([activity, hr, sleep]) => {
  const data = await Promise.all([activity.json(), hr.json(), sleep.json()]);
  displayWellness(data);  // Render table
  document.getElementById('sync-btn').onclick = () => pushToIntervals(data);
});
    // Push to intervals.icu
  });


      } catch (error) {
        statusEl.innerHTML = `<strong>❌ Error:</strong> ${error.message}<br>Token expired? Reconnect.`;
      }
    }

    // Auto-update status on page load
    updateStatus();
  </script>
</body>
</html>
