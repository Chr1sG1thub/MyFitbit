<!DOCTYPE html>

<body style="font-family: Arial; padding: 20px; max-width: 800px; margin: auto;">
  <h1>MyFitbit</h1>

  <a href="https://www.fitbit.com/oauth2/authorize?client_id=23TZ3L&redirect_uri=https://chr1sg1thub.github.io/MyFitbit/callback.html&response_type=token&scope=activity%20heartrate">
  Connect Fitbit
</a>
  

  
  <div id="status" style="margin-top: 20px; padding: 15px; border: 1px solid #ccc; min-height: 50px;">
    Loading...
  </div>

  <script>

const urlParams = new URLSearchParams(location.search);
if (urlParams.get('fitbit') === 'authorized') {
  const token = urlParams.get('token');
  const expires = parseInt(urlParams.get('expires') || 0);
  
  if (token && Date.now() < expires) {
    localStorage.setItem('fitbit_token', token);  // Now store locally
    localStorage.setItem('fitbit_expires', expires);
    loadFitbitData(token);  // Fetch wellness immediately
  }
}

async function loadFitbitData(token) {
  const activity = await fetch('https://api.fitbit.com/1/user/-/activities/date/today.json', {
    headers: { Authorization: `Bearer ${token}` }
  }).then(r => r.json());
  
  document.body.innerHTML += `
    <h2>Today's Data</h2>
    <p>Steps: ${activity.summary.steps}</p>
    <button onclick="syncToIntervals()">Push to Intervals.icu</button>
  `;
}
}
