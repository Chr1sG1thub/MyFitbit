<!DOCTYPE html>
<html>
<head><title>Fitbit Auth Complete</title></head>
<body>
  <script>
    const params = new URLSearchParams(window.location.hash.substring(1));
    const token = params.get('access_token');
    if (token) {
      // Store in localStorage (for your PWA)
      localStorage.setItem('fitbit_token', token);
      // Redirect to your main app
      window.location.href = 'https://my-fitbit.vercel.app/dashboard';
    } else {
      document.body.innerHTML = '<h1>Error: No token received</h1>';
    }
  </script>
</body>
</html>
