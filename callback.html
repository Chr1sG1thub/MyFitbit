<!DOCTYPE html>
<script>
  const params = new URLSearchParams(location.hash.slice(1));
  const token = params.get('access_token');
  if (token) {
    localStorage.setItem('fitbit_token', token);
    localStorage.setItem('fitbit_expires', Date.now() + params.get('expires_in') * 1000);
    window.location.href = 'https://chr1sg1thub.github.io/UpdateIntervals?fitbit=authorized';  // Same domain!
  }
</script>
