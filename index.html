<!DOCTYPE html>
<html>
<head>
  <title>MyFitbit</title>
  <meta name="viewport" content="width=device-width">
</head>
<body style="font-family: Arial; padding: 20px; max-width: 800px; margin: auto;">
  <h1>MyFitbit</h1>

<button onclick="connectFitbit()">Connect Fitbit</button>
  <div id="data"></div>
<script>
  if (location.search.includes('fitbit=authorized')) loadData();

//--------------------------------------------------------------------------------
  function connectFitbit() {
  const authUrl = `https://www.fitbit.com/oauth2/authorize?` +
    `client_id=23TZ3L&` +  // Your Client ID
    `redirect_uri=https://chr1sg1thub.github.io/MyFitbit/callback.html&` +
    `response_type=token&` +
    `scope=activity%20heartrate%20sleep`;  // Add scopes as needed
  
  location.href = authUrl;
}

//--------------------------------------------------------------------------------
async function loadData() {
  const token = localStorage.getItem('fitbit_token');
  document.getElementById('data').innerHTML = 'Loading...';

  let res = await fetch(`https://my-fitbit.vercel.app/api/fitbit?token=${encodeURIComponent(token)}`);
  let data = await res.json();
  
  document.getElementById('data').innerHTML = `
    <h2>Today</h2>
    <p>HRV: ${data.hrv[0].value.dailyRmssd}</p>
  `;
  res = await fetch(`https://my-fitbit.vercel.app/api/fitbit?endpoint=/1.2/user/-/sleep/date/2026-03-17.json&token=${encodeURIComponent(token)}`);
  data = await res.json();
  
  document.getElementById('data').innerHTML += `
    <p>Sleep: ${data.sleep[0].minutesAsleep}</p>
  `;
}
</script>

</body>
</html>
