<body style="font-family: Arial; padding: 20px; max-width: 800px; margin: auto;">
  <h1>MyFitbit</h1>

  <a href="https://www.fitbit.com/oauth2/authorize?client_id=23TZ3L&redirect_uri=https://chr1sg1thub.github.io/MyFitbit/callback.html&response_type=token&scope=activity%20heartrate">
  Connect Fitbit
</a>
  

  
  <div id="status" style="margin-top: 20px; padding: 15px; border: 1px solid #ccc; min-height: 50px;">
    Loading...
  </div>

  <script>

if (new URLSearchParams(location.search).get('fitbit') === 'authorized') {
  loadFitbitData();
}

async function loadFitbitData() {
  const token = localStorage.getItem('fitbit_token');
  const expires = parseInt(localStorage.getItem('fitbit_expires') || 0);
  
  if (!token || Date.now() > expires) {
    alert('Token expired/missing. <a href="auth-link">Reconnect Fitbit</a>');
    return;
  }

  try {
    // Fetch daily wellness
    const [activity, hr, sleep] = await Promise.all([
      fetch('https://api.fitbit.com/1/user/-/activities/date/today.json', {
        headers: { Authorization: `Bearer ${token}` }
      }).then(r => r.json()),
      fetch('https://api.fitbit.com/1/user/-/hr/date/today/1d.json', {
        headers: { Authorization: `Bearer ${token}` }
      }).then(r => r.json()),
      fetch('https://api.fitbit.com/1.2/user/-/sleep/date/today.json', {
        headers: { Authorization: `Bearer ${token}` }
      }).then(r => r.json())
    ]);

    // Display table
    document.body.innerHTML += `
      <table border=1>
        <tr><th>Metric</th><th>Value</th></tr>
        <tr><td>Steps</td><td>${activity.summary.steps}</td></tr>
        <tr><td>Resting HR</td><td>${hr.restingHeartRate || 'N/A'}</td></tr>
        <tr><td>Sleep (min)</td><td>${sleep.summary.totalMinutesAsleep || 0}</td></tr>
        <tr><td>Floors</td><td>${activity.summary.floors}</td></tr>
      </table>
      <button onclick="syncToIntervals()">Sync to Intervals.icu</button>
    `;
  } catch (err) {
    console.error('API error:', err);
    alert('API failed—token issue?');
  }
}
