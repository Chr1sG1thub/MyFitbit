<!DOCTYPE html>
<html>
<head>
  <title>MyFitbit</title>
  <meta name="viewport" content="width=device-width">
</head>
<body style="font-family: Arial; padding: 20px; max-width: 800px; margin: auto;">
  <h1>MyFitbit</h1>

<button onclick="connectFitbit()">Connect Fitbit</button>
  <div id="data"></div>
<script>
  if (location.search.includes('fitbit=authorized')) loadData();

//--------------------------------------------------------------------------------
  function connectFitbit() {
  const authUrl = `https://www.fitbit.com/oauth2/authorize?` +
    `client_id=23TZ3L&` +  // Your Client ID
    `redirect_uri=https://chr1sg1thub.github.io/MyFitbit/callback.html&` +
    `response_type=token&` +
    `scope=activity%20heartrate%20sleep%20respiratory_rate%20oxygen_saturation%20cardio_fitness%20weight`;  // Add scopes as needed
  
  location.href = authUrl;
}

//--------------------------------------------------------------------------------
async function loadData() {
  const token = localStorage.getItem('fitbit_token');
  document.getElementById('data').innerHTML = 'Loading...';

  const now = new Date();
const year = now.getFullYear();
const month = String(now.getMonth() + 1).padStart(2, '0');
const day = String(now.getDate()).padStart(2, '0');
const dateStr = `${year}-${month}-${day}`;

  document.getElementById('data').innerHTML = `
    <h2>Today</h2>
  `;

  let res, data;

  res = await fetch(`https://my-fitbit.vercel.app/api/fitbit?endpoint=/1/user/-/body/log/weight/date/${dateStr}.json&token=${encodeURIComponent(token)}`);
  data = await res.json();

  let weight = null;
  if (data?.weight[0]?.weight !== undefined) weight = data.weight[0].weight;
  
  document.getElementById('data').innerHTML += `
    <p>Weight: ${weight}</p>
  `;
  
  res = await fetch(`https://my-fitbit.vercel.app/api/fitbit?endpoint=/1.2/user/-/sleep/date/${dateStr}.json&token=${encodeURIComponent(token)}`);
  data = await res.json();

  let minutesAsleep = null;
  if (data?.sleep[0]?.minutesAsleep !== undefined) minutesAsleep = data.sleep[0].minutesAsleep;
  
  document.getElementById('data').innerHTML += `
    <p>Sleep: ${minutesAsleep}</p>
  `;
  
  res = await fetch(`https://my-fitbit.vercel.app/api/fitbit?endpoint=/1/user/-/br/date/today.json&token=${encodeURIComponent(token)}`);
  data = await res.json();

  let breathingRate = null;
  if (data?.br[0]?.value?.breathingRate !== undefined) breathingRate = data.br[0].value.breathingRate;
  
  document.getElementById('data').innerHTML += `
    <p>Breathing Rate: ${breathingRate}</p>
  `;
  
  res = await fetch(`https://my-fitbit.vercel.app/api/fitbit?endpoint=/1/user/-/spo2/date/today.json&token=${encodeURIComponent(token)}`);
  data = await res.json();

  let spo2 = null;
  if (data?.value?.avg !== undefined) spo2 = data.value.avg;
  
  document.getElementById('data').innerHTML += `
    <p>SPO2: ${spo2}</p>
  `;
  
  res = await fetch(`https://my-fitbit.vercel.app/api/fitbit?endpoint=/1/user/-/activities/heart/date/today/1d.json&token=${encodeURIComponent(token)}`);
  data = await res.json();
  
  let restingHeartRate = null;
  if ( data['activities-heart'][0]?.value?.restingHeartRate !== undefined) restingHeartRate = data['activities-heart'][0].value.restingHeartRate;
  
    document.getElementById('data').innerHTML += `
    <p>Resting Heart Rate: ${restingHeartRate}</p>
  `;
  
  res = await fetch(`https://my-fitbit.vercel.app/api/fitbit?endpoint=/1/user/-/hrv/date/today.json&token=${encodeURIComponent(token)}`);
  data = await res.json();

  let hrv = null;
  if ( data?.hrv[0]?.value?.dailyRmssd !== undefined) hrv =  data.hrv[0].value.dailyRmssd;
  
  document.getElementById('data').innerHTML += `
    <p>HRV: ${hrv}</p>
  `;
  
  res = await fetch(`https://my-fitbit.vercel.app/api/fitbit?endpoint=/1/user/-/cardioscore/date/today.json&token=${encodeURIComponent(token)}`);
  data = await res.json();

  let vo2Max = null;
  if ( data?.cardioScore[0]?.value?.vo2Max !== undefined) vo2Max =  data.cardioScore[0].value.vo2Max;

  document.getElementById('data').innerHTML += `
    <p>Cardio Fitness Score: ${vo2Max}</p>
  `;
}
</script>

</body>
</html>
